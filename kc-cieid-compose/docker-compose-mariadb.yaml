volumes:
  mariadb-volume:
    driver: local

services:
  cie-mariadb:
    image: mariadb:11.8 # Latest supported version -> https://www.keycloak.org/server/supported-configurations
    container_name: "cie-mariadb"
    networks:
      - cie-local-network
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${CIE_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${CIE_DB_SCHEMA}
      MYSQL_USER: ${CIE_DB_USR}
      MYSQL_PASSWORD: ${CIE_DB_PWD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mariadb-volume:/var/lib/mysql
