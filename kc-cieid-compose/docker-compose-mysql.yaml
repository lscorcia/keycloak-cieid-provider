volumes:
  mysql-volume:
    driver: local

services:
  cieid-mysql:
    image: mysql:8.4 # Latest supported version -> https://www.keycloak.org/server/supported-configurations
    container_name: "cieid-mysql"
    networks:
      - cieid-local-network
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${CIEID_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${CIEID_DB_SCHEMA}
      MYSQL_USER: ${CIEID_DB_USR}
      MYSQL_PASSWORD: ${CIEID_DB_PWD}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-volume:/var/lib/mysql
